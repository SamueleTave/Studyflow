<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Spotify — StudyFlow</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; font-family: sans-serif; background: #1DB954; color: #fff; }
    p { font-size: 1rem; opacity: 0.85; }
  </style>
</head>
<body>
<p>Connessione a Spotify...</p>
<script>
  (function() {
    var params = {};
    window.location.search.substring(1).split('&').forEach(function(p) {
      var kv = p.split('=');
      if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
    });

    var code     = params.code;
    var verifier = localStorage.getItem('sf_pkce_verifier');
    var clientId = localStorage.getItem('sf_pkce_client_id');
    localStorage.removeItem('sf_pkce_verifier');
    localStorage.removeItem('sf_pkce_client_id');

    if (!code || !verifier || !clientId || !window.opener) {
      document.querySelector('p').textContent = 'Errore di connessione. Riprova.';
      return;
    }

    fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type:    'authorization_code',
        code:          code,
        redirect_uri:  window.location.origin + '/spotify-callback.html',
        client_id:     clientId,
        code_verifier: verifier
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.access_token) {
        window.opener.postMessage(
          { type: 'sf_spotify_token', token: data.access_token, expires_in: data.expires_in },
          window.location.origin
        );
        document.querySelector('p').textContent = 'Connesso! Puoi chiudere questa finestra.';
        setTimeout(function() { window.close(); }, 1200);
      } else {
        document.querySelector('p').textContent = 'Errore: ' + (data.error_description || data.error || 'sconosciuto');
      }
    })
    .catch(function() {
      document.querySelector('p').textContent = 'Errore di rete. Riprova.';
    });
  })();
</script>
</body>
</html>
