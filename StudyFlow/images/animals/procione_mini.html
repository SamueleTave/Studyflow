<!DOCTYPE html>

<meta charset="UTF-8">
<title>🦝 Procione Mini — Animazioni</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #4E88B0; display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 40px 20px 60px; font-family: 'Segoe UI', sans-serif; }
h1 { color: white; font-size: 1.4rem; font-weight: 900; letter-spacing: .1em; text-shadow: 0 2px 8px rgba(0,0,0,.35); }
.grid { display: flex; flex-wrap: wrap; gap: 22px; justify-content: center; max-width: 760px; }
.pose { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.label { font-size: .62rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.9); }
.card { background: white; border-radius: 14px; padding: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.22); }

/* ── IDLE ── */
.idle-g { animation: idle 1.4s ease-in-out infinite; }
@keyframes idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* ── WALK ── */
.walk-g { animation: walk-bob 0.46s ease-in-out infinite; }
@keyframes walk-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
.wll,.wlr,.wal,.war { transform-box:fill-box; transform-origin:50% 0%; }
.wll { animation: limb-swing 0.46s ease-in-out infinite; }
.wlr { animation: limb-swing 0.46s ease-in-out infinite; animation-delay:-0.23s; }
.wal { animation: limb-swing 0.46s ease-in-out infinite; animation-delay:-0.23s; }
.war { animation: limb-swing 0.46s ease-in-out infinite; }
@keyframes limb-swing { 0%,100%{transform:rotate(-20deg)} 50%{transform:rotate(20deg)} }

/* ── RUN ── */
.run-g { animation: run-bob 0.25s ease-in-out infinite; }
@keyframes run-bob { 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-7px) rotate(-6deg)} }
.rll,.rlr,.ral,.rar { transform-box:fill-box; transform-origin:50% 0%; }
.rll { animation: run-limb 0.25s ease-in-out infinite; }
.rlr { animation: run-limb 0.25s ease-in-out infinite; animation-delay:-0.125s; }
.ral { animation: run-limb 0.25s ease-in-out infinite; animation-delay:-0.125s; }
.rar { animation: run-limb 0.25s ease-in-out infinite; }
@keyframes run-limb { 0%,100%{transform:rotate(-38deg)} 50%{transform:rotate(38deg)} }

/* ── HURT ── */
.hurt-g { animation: hurt-shake 0.08s ease-in-out infinite; }
@keyframes hurt-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.hurt-ov { animation: hurt-flash 0.16s ease-in-out infinite; }
@keyframes hurt-flash { 0%,100%{opacity:0} 50%{opacity:.6} }

/* ── DIZZY ── */
.dz1,.dz2,.dz3 { transform-box:fill-box; transform-origin:50% 50%; }
.dz1 { animation: dzspin 1.1s linear infinite; }
.dz2 { animation: dzspin 1.1s linear infinite; animation-delay:-.37s; }
.dz3 { animation: dzspin 1.1s linear infinite; animation-delay:-.73s; }
@keyframes dzspin { from{transform:rotate(0deg) translateX(18px)} to{transform:rotate(360deg) translateX(18px)} }
.dz-eye-l,.dz-eye-r { animation: dz-eyespin 0.6s linear infinite; transform-box:fill-box; transform-origin:50% 50%; }
@keyframes dz-eyespin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ── SLEEP ── */
.sleep-g { animation: sleep-breath 2.2s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 75%; }
@keyframes sleep-breath { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.035)} }
.z1 { animation: zzz 2.2s ease-in-out infinite; }
.z2 { animation: zzz 2.2s ease-in-out infinite; animation-delay:-.73s; }
.z3 { animation: zzz 2.2s ease-in-out infinite; animation-delay:-1.46s; }
@keyframes zzz { 0%,100%{opacity:.25;transform:translate(0,0) scale(.7)} 50%{opacity:1;transform:translate(6px,-12px) scale(1.1)} }
</style>
</head>
