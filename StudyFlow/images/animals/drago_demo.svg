<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="200" height="217" aria-label="Draghetto">

  <!-- Ombra sotto -->
  <ellipse cx="60" cy="124" rx="28" ry="5" fill="rgba(0,0,0,0.12)"/>

  <!-- Coda (dietro corpo) -->
  <path d="M76,88 C92,84 108,76 112,60 C115,46 106,38 100,48 C94,58 90,74 78,84Z"
    fill="#7C3AED"/>
  <!-- Punta coda -->
  <polygon points="112,56 120,44 104,44" fill="#A78BFA"/>

  <!-- Ali membranose (dietro) -->
  <path d="M36,68 C18,50 6,26 14,10 C18,2 28,4 30,18 C32,32 34,56 36,68Z"
    fill="#6D28D9" opacity="0.85"/>
  <path d="M36,68 C22,54 14,34 20,16 C28,36 32,52 36,68Z"
    fill="#8B5CF6" opacity="0.5"/>
  <!-- Costole ala sinistra -->
  <line x1="36" y1="68" x2="14" y2="10" stroke="#4C1D95" stroke-width="1.2" opacity="0.5"/>
  <line x1="36" y1="68" x2="22" y2="18" stroke="#4C1D95" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="68" x2="28" y2="24" stroke="#4C1D95" stroke-width="1" opacity="0.4"/>

  <path d="M84,68 C102,50 114,26 106,10 C102,2 92,4 90,18 C88,32 86,56 84,68Z"
