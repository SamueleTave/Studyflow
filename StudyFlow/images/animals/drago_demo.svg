  <path d="M84,68 C98,54 106,34 100,16 C92,36 88,52 84,68Z"
    fill="#8B5CF6" opacity="0.5"/>
  <!-- Costole ala destra -->
  <line x1="84" y1="68" x2="106" y2="10" stroke="#4C1D95" stroke-width="1.2" opacity="0.5"/>
  <line x1="84" y1="68" x2="98" y2="18" stroke="#4C1D95" stroke-width="1" opacity="0.4"/>
  <line x1="84" y1="68" x2="92" y2="24" stroke="#4C1D95" stroke-width="1" opacity="0.4"/>

  <!-- Corpo -->
  <ellipse cx="60" cy="90" rx="26" ry="24" fill="#7C3AED"/>
  <!-- Pancia chiara con scagliette -->
  <ellipse cx="60" cy="94" rx="16" ry="16" fill="#A78BFA" opacity="0.55"/>
  <ellipse cx="60" cy="97" rx="12" ry="11" fill="#C4B5FD" opacity="0.45"/>
  <!-- Scaglie corpo -->
  <path d="M48,80 Q52,76 56,80" fill="none" stroke="#5B21B6" stroke-width="1.5" opacity="0.5"/>
  <path d="M56,80 Q60,76 64,80" fill="none" stroke="#5B21B6" stroke-width="1.5" opacity="0.5"/>
  <path d="M64,80 Q68,76 72,80" fill="none" stroke="#5B21B6" stroke-width="1.5" opacity="0.5"/>
  <path d="M46,90 Q50,86 54,90" fill="none" stroke="#5B21B6" stroke-width="1.2" opacity="0.4"/>
  <path d="M66,90 Q70,86 74,90" fill="none" stroke="#5B21B6" stroke-width="1.2" opacity="0.4"/>

  <!-- Zampe anteriori -->
  <path d="M40,100 Q34,106 32,112" fill="none" stroke="#6D28D9" stroke-width="8" stroke-linecap="round"/>
  <path d="M28,113 L24,118" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M32,114 L30,120" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M36,114 L36,120" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M80,100 Q86,106 88,112" fill="none" stroke="#6D28D9" stroke-width="8" stroke-linecap="round"/>
  <path d="M92,113 L96,118" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M88,114 L90,120" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M84,114 L84,120" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Testa -->
  <circle cx="60" cy="52" r="24" fill="#7C3AED"/>

  <!-- Cornini -->
  <path d="M46,34 C42,22 38,14 40,8 C44,16 46,26 48,34Z" fill="#5B21B6"/>
  <path d="M74,34 C78,22 82,14 80,8 C76,16 74,26 72,34Z" fill="#5B21B6"/>
  <!-- Punte cornini -->
  <polygon points="40,8 36,2 44,6" fill="#8B5CF6"/>
  <polygon points="80,8 84,2 76,6" fill="#8B5CF6"/>

  <!-- Cresta dorsale sulla testa -->
  <path d="M52,30 Q56,22 60,26 Q64,18 68,22 Q64,30 60,34 Q56,38 52,30Z" fill="#8B5CF6" opacity="0.7"/>

  <!-- Occhi grandi espressivi -->
  <circle cx="46" cy="52" r="9" fill="#0D9488"/>
  <circle cx="46" cy="52" r="6.5" fill="#065F46"/>
  <circle cx="46" cy="52" r="3.5" fill="#0A1628"/>
  <circle cx="48.5" cy="49.5" r="2" fill="white"/>
  <circle cx="74" cy="52" r="9" fill="#0D9488"/>
  <circle cx="74" cy="52" r="6.5" fill="#065F46"/>
  <circle cx="74" cy="52" r="3.5" fill="#0A1628"/>
  <circle cx="76.5" cy="49.5" r="2" fill="white"/>

  <!-- Sopracciglia espressive -->
  <path d="M38,44 Q46,40 52,44" fill="none" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M68,44 Q74,40 82,44" fill="none" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Narici -->
  <ellipse cx="54" cy="62" rx="3" ry="2" fill="#5B21B6" opacity="0.6"/>
  <ellipse cx="66" cy="62" rx="3" ry="2" fill="#5B21B6" opacity="0.6"/>

  <!-- Bocca sorridente -->
  <path d="M48,66 Q60,76 72,66" fill="none" stroke="#5B21B6" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Fiammella dalla bocca -->
  <g transform="translate(60,70)">
    <!-- Fiamma base arancio -->
    <path d="M-6,0 C-8,8 -4,20 0,26 C4,20 8,8 6,0 C4,10 2,16 0,20 C-2,16 -4,10 -6,0Z"
      fill="#F97316" opacity="0.95"/>
    <!-- Fiamma interna gialla -->
    <path d="M-3,2 C-4,10 -2,18 0,22 C2,18 4,10 3,2 C2,8 1,12 0,15 C-1,12 -2,8 -3,2Z"
      fill="#FCD34D" opacity="0.9"/>
    <!-- Punta bianca -->
    <circle cx="0" cy="4" r="2.5" fill="white" opacity="0.7"/>
  </g>

</svg>
