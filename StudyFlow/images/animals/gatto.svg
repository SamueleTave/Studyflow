<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120" aria-label="Gatto">
  <style>
    :root { --cat-main:#F4C996; --cat-shadow:#E8A87C; --cat-ear-inner:#FFB3C6; --cat-eye:#2C3E50; --cat-stripe:#D4935A; --cat-nose:#E8778A; }
  </style>
  <!-- Tail -->
  <path d="M28,86 Q5,74 9,53 Q13,32 27,68" fill="none" stroke="#E8A87C" stroke-width="9" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="52" cy="87" rx="26" ry="22" fill="#F4C996"/>
  <!-- Front paw left -->
  <ellipse cx="37" cy="108" rx="11" ry="7" fill="#F4C996"/>
  <line x1="33" y1="108" x2="33" y2="113" stroke="#E8A87C" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="37" y1="110" x2="37" y2="115" stroke="#E8A87C" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="41" y1="108" x2="41" y2="113" stroke="#E8A87C" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Front paw right -->
  <ellipse cx="65" cy="108" rx="11" ry="7" fill="#F4C996"/>
  <line x1="61" y1="108" x2="61" y2="113" stroke="#E8A87C" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="65" y1="110" x2="65" y2="115" stroke="#E8A87C" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="69" y1="108" x2="69" y2="113" stroke="#E8A87C" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="52" cy="43" r="27" fill="#F4C996"/>
  <!-- Ears -->
  <polygon points="27,30 20,7 43,24" fill="#F4C996"/>
  <polygon points="77,30 80,7 57,24" fill="#F4C996"/>
  <polygon points="29,27 24,12 41,23" fill="#FFB3C6"/>
  <polygon points="75,27 76,12 59,23" fill="#FFB3C6"/>
  <!-- Stripes -->
  <path d="M38,22 Q40,16 44,14" fill="none" stroke="#D4935A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M36,27 Q38,21 43,19" fill="none" stroke="#D4935A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M62,22 Q60,16 56,14" fill="none" stroke="#D4935A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M64,27 Q62,21 57,19" fill="none" stroke="#D4935A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Eyes -->
  <ellipse cx="41" cy="42" rx="6.5" ry="7" fill="#2C3E50"/>
  <ellipse cx="41" cy="42" rx="3.8" ry="4.5" fill="#050A0E"/>
  <circle cx="43.5" cy="39.5" r="1.7" fill="white"/>
  <ellipse cx="63" cy="42" rx="6.5" ry="7" fill="#2C3E50"/>
  <ellipse cx="63" cy="42" rx="3.8" ry="4.5" fill="#050A0E"/>
  <circle cx="65.5" cy="39.5" r="1.7" fill="white"/>
  <!-- Nose -->
  <ellipse cx="52" cy="55" rx="4" ry="3" fill="#E8778A"/>
  <!-- Mouth -->
  <path d="M49,58 Q52,62 55,58" fill="none" stroke="#D4935A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="49" y1="55" x2="29" y2="50" stroke="#CCC" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="49" y1="58" x2="27" y2="58" stroke="#CCC" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="55" y1="55" x2="75" y2="50" stroke="#CCC" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="55" y1="58" x2="77" y2="58" stroke="#CCC" stroke-width="1.2" stroke-linecap="round"/>
</svg>
