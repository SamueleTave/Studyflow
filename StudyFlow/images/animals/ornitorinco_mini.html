<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🦆 Ornitorinco Mini — Animazioni</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #4E88B0; display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 40px 20px 60px; font-family: 'Segoe UI', sans-serif; }
h1 { color: white; font-size: 1.4rem; font-weight: 900; letter-spacing: .1em; text-shadow: 0 2px 8px rgba(0,0,0,.35); }
.grid { display: flex; flex-wrap: wrap; gap: 22px; justify-content: center; max-width: 800px; }
.pose { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.label { font-size: .62rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.9); }
.card { background: white; border-radius: 14px; padding: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.22); }

/* ── IDLE ── */
.idle-g { animation: idle 1.8s ease-in-out infinite; }
@keyframes idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* ── WALK ── */
.walk-g { animation: walk-bob 0.5s ease-in-out infinite; }
@keyframes walk-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
.wfl,.wfr { transform-box:fill-box; transform-origin:50% 0%; }
.wfl { animation: foot-swing 0.5s ease-in-out infinite; }
.wfr { animation: foot-swing 0.5s ease-in-out infinite; animation-delay:-0.25s; }
@keyframes foot-swing { 0%,100%{transform:rotate(-18deg)} 50%{transform:rotate(18deg)} }

/* ── HAPPY ── */
.happy-g { animation: happy-bounce 0.4s ease-in-out infinite alternate; }
@keyframes happy-bounce { 0%{transform:translateY(0) scaleY(1)} 100%{transform:translateY(-8px) scaleY(1.04)} }

/* ── SLEEP ── */
.sleep-g { animation: sleep-breath 2.4s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 75%; }
@keyframes sleep-breath { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.04)} }
.z1 { animation: zzz 2.4s ease-in-out infinite; }
.z2 { animation: zzz 2.4s ease-in-out infinite; animation-delay:-.8s; }
.z3 { animation: zzz 2.4s ease-in-out infinite; animation-delay:-1.6s; }
@keyframes zzz { 0%,100%{opacity:.2;transform:translate(0,0) scale(.7)} 50%{opacity:1;transform:translate(5px,-11px) scale(1.1)} }
</style>
</head>
