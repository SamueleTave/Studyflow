<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>🦆 Ornitorinco v2 — Design</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #3B7BC8;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  padding: 50px 20px 80px;
  font-family: 'Segoe UI', sans-serif;
}
h1 { color: white; font-size: 1.5rem; font-weight: 900; letter-spacing: .08em; text-shadow: 0 2px 10px rgba(0,0,0,.4); }
.row { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
.pose { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.label { font-size: .65rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.9); }
.card { background: white; border-radius: 18px; padding: 18px; box-shadow: 0 6px 28px rgba(0,0,0,.28); }
.bg-check .card { background: #F0E8D8; }
.bg-night .card { background: #1e2a3a; }

/* ── Animazioni ── */
.idle-g  { animation: idle-bob  2s   ease-in-out infinite; }
.walk-g  { animation: walk-hop  0.5s ease-in-out infinite; }
.happy-g { animation: happy-bounce 0.38s ease-in-out infinite alternate; }
.sleep-g { animation: sleep-breath 2.8s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 70%; }

@keyframes idle-bob    { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-5px)} }
@keyframes walk-hop    { 0%,100%{transform:translateY(0)}   50%{transform:translateY(-4px)} }
@keyframes happy-bounce{ 0%{transform:translateY(0) scaleY(1)} 100%{transform:translateY(-9px) scaleY(1.03)} }
@keyframes sleep-breath{ 0%,100%{transform:scaleY(1)}       50%{transform:scaleY(1.05)} }

.foot-l { animation: foot-l 0.5s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 10%; }
.foot-r { animation: foot-r 0.5s ease-in-out infinite; transform-box:fill-box; transform-origin:50% 10%; }
@keyframes foot-l { 0%,100%{transform:rotate(-16deg)} 50%{transform:rotate(16deg)} }
@keyframes foot-r { 0%,100%{transform:rotate(16deg)}  50%{transform:rotate(-16deg)} }

.zzz-1 { animation: zzz 2.8s ease-in-out infinite; }
.zzz-2 { animation: zzz 2.8s ease-in-out infinite; animation-delay:-.93s; }
.zzz-3 { animation: zzz 2.8s ease-in-out infinite; animation-delay:-1.87s; }
@keyframes zzz { 0%,100%{opacity:.15;transform:translate(0,0) scale(.65)} 50%{opacity:1;transform:translate(7px,-14px) scale(1.12)} }
</style>
</head>
