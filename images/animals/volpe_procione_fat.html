<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Volpe & Procione — Cute Fat Style</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #4A7FA5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    padding: 40px 20px;
    font-family: 'Segoe UI', sans-serif;
  }
  .animal-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .animal-title {
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .poses-row {
    display: flex;
    gap: 28px;
    align-items: flex-end;
    background: rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 30px 40px;
    backdrop-filter: blur(8px);
  }
  .pose-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .pose-label {
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: white;
    opacity: 0.85;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }
</style>
</head>
